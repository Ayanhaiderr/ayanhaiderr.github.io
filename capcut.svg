<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- top rounded rect (film frame outline) -->
  <rect x="22" y="22" width="118" height="44" rx="22"
        fill="none" stroke="white" stroke-width="14"/>
  <!-- bottom rounded rect -->
  <rect x="22" y="134" width="118" height="44" rx="22"
        fill="none" stroke="white" stroke-width="14"/>
  <!-- X cross connecting the two rects -->
  <line x1="29"  y1="66"  x2="133" y2="134"
        stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="133" y1="66"  x2="29"  y2="134"
        stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- diagonal blade / slash -->
  <line x1="128" y1="16"  x2="170" y2="184"
        stroke="white" stroke-width="14" stroke-linecap="round"/>
</svg>
