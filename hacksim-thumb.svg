  <rect x="538" y="24" width="334" height="228" rx="8" fill="#0d1622" stroke="#1e3040" stroke-width="1.5"/>
  <rect x="538" y="24" width="334" height="34" rx="8" fill="#131c2e"/>
  <rect x="538" y="44" width="334" height="14" fill="#131c2e"/>
  <text x="705" y="47" text-anchor="middle" font-family="Consolas,monospace" font-size="11" fill="rgba(136,153,170,0.65)" letter-spacing="1">AGENT PROFILE</text>

  <!-- Stats -->
  <text x="558" y="82" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.5)" letter-spacing="1.5">CODENAME</text>
  <text x="558" y="100" font-family="Consolas,monospace" font-size="15" font-weight="700" fill="#00d4ff" filter="url(#cg)">PHANTOM_X</text>

  <text x="558" y="122" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.5)" letter-spacing="1.5">LEVEL</text>
  <text x="558" y="140" font-family="Consolas,monospace" font-size="22" font-weight="700" fill="#00ff88" filter="url(#gg)">12</text>
  <text x="590" y="140" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.5)">  / ELITE HACKER</text>

  <!-- XP bar -->
  <text x="558" y="160" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.5)" letter-spacing="1.5">XP PROGRESS</text>
  <rect x="558" y="166" width="294" height="10" rx="5" fill="#0a1020" stroke="rgba(30,48,64,0.8)" stroke-width="1"/>
  <rect x="559" y="167" width="201" height="8" rx="4" fill="url(#barGrad)"/>
  <text x="852" y="176" text-anchor="end" font-family="Consolas,monospace" font-size="10" fill="rgba(136,153,170,0.6)">8400 / 12000</text>

  <!-- Score -->
  <text x="558" y="200" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.5)" letter-spacing="1.5">TOTAL SCORE</text>
  <text x="558" y="220" font-family="Consolas,monospace" font-size="20" font-weight="700" fill="#ffd700">142,850</text>

  <!-- ── MISSIONS PANEL ── -->
  <rect x="538" y="266" width="334" height="230" rx="8" fill="#0d1622" stroke="#1e3040" stroke-width="1.5"/>
  <rect x="538" y="266" width="334" height="34" rx="8" fill="#131c2e"/>
  <rect x="538" y="286" width="334" height="14" fill="#131c2e"/>
  <text x="705" y="289" text-anchor="middle" font-family="Consolas,monospace" font-size="11" fill="rgba(136,153,170,0.65)" letter-spacing="1">ACTIVE MISSIONS</text>

  <!-- Mission 1 — complete -->
  <rect x="554" y="314" width="302" height="44" rx="5" fill="rgba(0,255,136,0.05)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
  <circle cx="572" cy="336" r="8" fill="rgba(0,255,136,0.15)" stroke="rgba(0,255,136,0.5)" stroke-width="1.5"/>
  <text x="572" y="340" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="#00ff88">✓</text>
  <text x="590" y="331" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.75)">Ghost Protocol</text>
  <text x="590" y="348" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.55)">Infiltrate without detection</text>
  <text x="845" y="340" text-anchor="end" font-family="Consolas,monospace" font-size="11" fill="#00ff88">+500 XP</text>

  <!-- Mission 2 — in progress -->
  <rect x="554" y="366" width="302" height="44" rx="5" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <circle cx="572" cy="388" r="8" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.5)" stroke-width="1.5"/>
  <text x="572" y="392" text-anchor="middle" font-family="Consolas,monospace" font-size="9" fill="#00d4ff">▶</text>
  <text x="590" y="383" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.75)">Data Heist</text>
  <text x="590" y="400" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.55)">Extract encrypted vault files</text>
  <text x="845" y="392" text-anchor="end" font-family="Consolas,monospace" font-size="11" fill="#00d4ff">70%</text>

  <!-- Mission 3 — locked -->
  <rect x="554" y="418" width="302" height="44" rx="5" fill="rgba(30,48,64,0.3)" stroke="rgba(30,48,64,0.6)" stroke-width="1"/>
  <circle cx="572" cy="440" r="8" fill="rgba(30,48,64,0.5)" stroke="rgba(136,153,170,0.2)" stroke-width="1.5"/>
  <text x="572" y="444" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="rgba(136,153,170,0.4)">🔒</text>
  <text x="590" y="435" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600" fill="rgba(136,153,170,0.35)">Zero Day</text>
  <text x="590" y="452" font-family="Segoe UI,sans-serif" font-size="10" fill="rgba(136,153,170,0.3)">Requires Level 15</text>
  <text x="845" y="444" text-anchor="end" font-family="Consolas,monospace" font-size="11" fill="rgba(136,153,170,0.3)">Locked</text>

  <!-- HUD corners -->
  <!-- Top-left bracket -->
  <polyline points="4,14 4,4 14,4" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2"/>
  <!-- Top-right bracket -->
  <polyline points="886,14 886,4 876,4" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2"/>
  <!-- Bottom-left bracket -->
  <polyline points="4,506 4,516 14,516" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2"/>
  <!-- Bottom-right bracket -->
  <polyline points="886,506 886,516 876,516" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2"/>

  <!-- Bottom HUD bar -->
  <rect x="0" y="490" width="900" height="30" fill="rgba(13,22,34,0.95)"/>
  <line x1="0" y1="490" x2="900" y2="490" stroke="rgba(30,48,64,0.9)" stroke-width="1"/>
  <text x="20" y="510" font-family="Consolas,monospace" font-size="11" fill="rgba(0,255,136,0.6)">● ONLINE</text>
  <text x="450" y="510" text-anchor="middle" font-family="Consolas,monospace" font-size="11" fill="rgba(136,153,170,0.45)" letter-spacing="1">HACKSIM v2.4 — BROWSER HACKING SIMULATION</text>
  <text x="880" y="510" text-anchor="end" font-family="Consolas,monospace" font-size="11" fill="rgba(0,212,255,0.5)">TOR ● SECURE</text>
</svg>
