<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="72%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <filter id="gg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#hbg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="130" x2="900" y2="130" stroke="rgba(30,48,64,0.4)" stroke-width="1"/>
  <line x1="0" y1="260" x2="900" y2="260" stroke="rgba(30,48,64,0.4)" stroke-width="1"/>
  <line x1="0" y1="390" x2="900" y2="390" stroke="rgba(30,48,64,0.4)" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="520" stroke="rgba(30,48,64,0.3)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="520" stroke="rgba(30,48,64,0.3)" stroke-width="1"/>
  <line x1="675" y1="0" x2="675" y2="520" stroke="rgba(30,48,64,0.3)" stroke-width="1"/>

  <!-- ── LEFT TERMINAL PANEL ── -->
  <rect x="28" y="24" width="490" height="472" rx="8" fill="#0d1622" stroke="#1e3040" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="28" y="24" width="490" height="34" rx="8" fill="#131c2e"/>
  <rect x="28" y="44" width="490" height="14" fill="#131c2e"/>
  <circle cx="50" cy="41" r="6" fill="#ff3355" opacity="0.85"/>
  <circle cx="70" cy="41" r="6" fill="#ffd700" opacity="0.85"/>
  <circle cx="90" cy="41" r="6" fill="#00ff88" opacity="0.85"/>
  <text x="273" y="46" text-anchor="middle" font-family="Consolas,monospace" font-size="11" fill="rgba(136,153,170,0.65)" letter-spacing="1">root@hacksim ~ $</text>

  <!-- Terminal lines -->
  <text x="48" y="82" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.5)">$ ./hacksim --target 192.168.1.104 --mode stealth</text>

  <text x="48" y="106" font-family="Consolas,monospace" font-size="12" fill="#00ff88" filter="url(#gg)">[INIT]</text>
  <text x="100" y="106" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.75)"> Loading exploit modules...</text>

  <text x="48" y="126" font-family="Consolas,monospace" font-size="12" fill="#00ff88" filter="url(#gg)">[OK]</text>
  <text x="91" y="126" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.75)">  Port scan complete — 3 open ports found</text>

  <text x="48" y="146" font-family="Consolas,monospace" font-size="12" fill="#00d4ff" filter="url(#cg)">[SCAN]</text>
  <text x="102" y="146" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.75)"> 22/ssh  80/http  443/https</text>

  <text x="48" y="166" font-family="Consolas,monospace" font-size="12" fill="#00ff88" filter="url(#gg)">[ATCK]</text>
  <text x="102" y="166" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.75)"> Brute-forcing SSH on port 22...</text>

  <!-- Progress bar area -->
  <rect x="48" y="178" width="440" height="18" rx="3" fill="#0a1020" stroke="rgba(30,48,64,0.8)" stroke-width="1"/>
  <rect x="49" y="179" width="308" height="16" rx="2" fill="url(#barGrad)" opacity="0.9"/>
  <text x="502" y="192" text-anchor="end" font-family="Consolas,monospace" font-size="11" fill="#00ff88">70%</text>

  <text x="48" y="216" font-family="Consolas,monospace" font-size="12" fill="#ffd700">[WARN]</text>
  <text x="102" y="216" font-family="Consolas,monospace" font-size="12" fill="rgba(255,215,0,0.7)"> Firewall detected — switching route...</text>

  <text x="48" y="236" font-family="Consolas,monospace" font-size="12" fill="#00d4ff" filter="url(#cg)">[PROXY]</text>
  <text x="114" y="236" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.75)"> Routing via TOR — 4 hops</text>

  <text x="48" y="256" font-family="Consolas,monospace" font-size="12" fill="#00ff88" filter="url(#gg)">[OK]</text>
  <text x="91" y="256" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.75)">  SSH session established</text>

  <!-- Separator -->
  <line x1="48" y1="270" x2="500" y2="270" stroke="rgba(30,48,64,0.9)" stroke-width="1"/>

  <text x="48" y="290" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.5)">$ ls /var/secret/</text>
  <text x="48" y="310" font-family="Consolas,monospace" font-size="12" fill="#00d4ff" filter="url(#cg)">credentials.db</text>
  <text x="180" y="310" font-family="Consolas,monospace" font-size="12" fill="#00d4ff" filter="url(#cg)"> admin_keys.txt</text>
  <text x="340" y="310" font-family="Consolas,monospace" font-size="12" fill="#cc44ff"> vault_access.enc</text>

  <text x="48" y="330" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.5)">$ cat credentials.db</text>
  <text x="48" y="350" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.65)">admin : </text>
  <text x="112" y="350" font-family="Consolas,monospace" font-size="12" fill="#00ff88" filter="url(#gg)">▓▓▓▓▓▓▓▓</text>
  <text x="210" y="350" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.4)">  [decrypting...]</text>

  <!-- Blinking cursor line -->
  <text x="48" y="380" font-family="Consolas,monospace" font-size="12" fill="rgba(136,153,170,0.5)">$ _</text>

  <!-- ACCESS GRANTED banner -->
  <rect x="48" y="400" width="440" height="60" rx="6" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.25)" stroke-width="1.5"/>
  <text x="268" y="424" text-anchor="middle" font-family="Consolas,monospace" font-size="13" font-weight="700" fill="#00ff88" filter="url(#gg)" letter-spacing="3">✓  ACCESS GRANTED</text>
  <text x="268" y="446" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="rgba(0,255,136,0.55)" letter-spacing="1">MISSION OBJECTIVE COMPLETE — +850 XP</text>

